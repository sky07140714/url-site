<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3Dデータ一覧</title>
  <style>
    body { font-family: Arial; margin:0; padding:10px; background:#f2f2f2; }
    h1 { text-align:center; }
    input, select { width:95%; padding:12px; margin:10px auto; display:block; font-size:16px; }
    .item { background:white; margin:10px auto; padding:15px; width:95%; border-radius:12px; display:flex; justify-content:space-between; }
    .favorite { border:2px solid gold; }
  </style>
</head>
<body>

<h1>3Dデータ一覧</h1>

<input id="search" placeholder="検索" oninput="search()">
<select id="categoryFilter" onchange="search()">
  <option value="">すべて</option>
</select>

<div id="list"></div>

<script>
let links = [];
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

async function loadData() {
  const res = await fetch("data.json?" + Date.now());
  links = await res.json();
  setupCategories();
  render();
}

function setupCategories() {
  const select = document.getElementById("categoryFilter");
  const categories = [...new Set(links.map(l => l.category || "未分類"))];

  categories.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

function render(listData = links) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  listData.sort((a,b)=>{
    return (favorites.includes(b.url)) - (favorites.includes(a.url));
  });

  listData.forEach(link=>{
    const isFav = favorites.includes(link.url);

    const div = document.createElement("div");
    div.className = "item " + (isFav ? "favorite" : "");

    div.innerHTML = `
  <div style="display:flex; gap:10px; align-items:center;">
    <img src="${link.image}" style="width:80px;height:80px;object-fit:cover;border-radius:10px;">
    
    <div>
      <b>${isFav?"⭐":""}${link.title}</b><br>
      <small>${link.url}</small><br>
      <small>📂 ${link.category || "未分類"}</small>
    </div>
  </div>

  <div>
    <button onclick="window.open('${link.url}')">開く</button>
    <button onclick="toggleFavorite('${link.url}')">★</button>
  </div>
`;
    list.appendChild(div);
  });
}

function search() {
  const q = document.getElementById("search").value.toLowerCase();
  const cat = document.getElementById("categoryFilter").value;

  const filtered = links.filter(l => {
    const matchText = l.title.toLowerCase().includes(q);
    const matchCat = !cat || (l.category || "未分類") === cat;
    return matchText && matchCat;
  });

  render(filtered);
}

function toggleFavorite(url) {
  if (favorites.includes(url)) {
    favorites = favorites.filter(f=>f!==url);
  } else {
    favorites.push(url);
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  render();
}

loadData();
</script>

</body>
</html>
